services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: dei-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - storage-data:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
      - vendor-data:/var/www/html/vendor
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: dei-nginx
    restart: unless-stopped
    ports:
      - "${APP_HOST_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: dei-worker
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - storage-data:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
      - vendor-data:/var/www/html/vendor
    command: php artisan queue:work database --tries=3 --backoff=5 --sleep=1
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: dei-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: device_event_ingestion_svc
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dei-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
  storage-data:
  bootstrap-cache:
  vendor-data:
